<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devotion to Goddess Aria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Crimson+Pro:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --rich-gold: #C5A028;
            --deep-burgundy: #2B1B1B;
            --soft-cream: #F8F6F0;
            --shadow-gold: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: linear-gradient(135deg, var(--deep-burgundy) 0%, #1a1212 50%, var(--deep-burgundy) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(197, 160, 40, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .ornament {
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInDown 1.2s ease-out 0.3s forwards;
        }

        .ornament-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .ornament-line::before,
        .ornament-line::after {
            content: '';
            height: 1px;
            width: 80px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .ornament-symbol {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3rem;
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15rem;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px var(--shadow-gold);
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 300;
            font-style: italic;
            color: var(--soft-cream);
            opacity: 0.7;
            letter-spacing: 0.1rem;
        }

        .affirmation-card {
            background: rgba(248, 246, 240, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            padding: 4rem 3rem;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(212, 175, 55, 0.1);
            opacity: 0;
            animation: fadeInUp 1.2s ease-out 0.6s forwards;
        }

        .affirmation-card::before {
            content: '';
            position: absolute;
            top: 30px;
            left: 30px;
            width: 40px;
            height: 40px;
            border-left: 2px solid var(--gold);
            border-top: 2px solid var(--gold);
            opacity: 0.4;
        }

        .affirmation-card::after {
            content: '';
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-right: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            opacity: 0.4;
        }

        .affirmation-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            line-height: 1.6;
            color: var(--soft-cream);
            text-align: center;
            font-weight: 300;
            letter-spacing: 0.02rem;
            position: relative;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .affirmation-content {
            position: absolute;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .affirmation-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        .affirmation-content.exiting {
            opacity: 0;
            transform: translateY(-20px);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .control-btn {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--gold);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .control-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .play-pause-btn {
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
        }

        .progress-indicator {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--gold);
            box-shadow: 0 0 10px var(--shadow-gold);
            transform: scale(1.3);
        }

        .counter {
            font-family: 'Crimson Pro', serif;
            font-size: 0.85rem;
            color: var(--gold);
            opacity: 0.6;
            letter-spacing: 0.1rem;
            min-width: 60px;
            text-align: center;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }

            .affirmation-text {
                font-size: 1.5rem;
                min-height: 100px;
            }

            .affirmation-card {
                padding: 3rem 2rem;
            }

            .ornament-line::before,
            .ornament-line::after {
                width: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ornament">
            <div class="ornament-line">
                <span class="ornament-symbol">◆</span>
            </div>
            <h1 class="title">Goddess Aria</h1>
            <p class="subtitle">Devotion in Practice</p>
        </div>

        <div class="affirmation-card">
            <div class="affirmation-text" id="affirmationText">
                <div class="affirmation-content active"></div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="prevBtn" title="Previous">‹</button>
            <button class="control-btn play-pause-btn" id="playPauseBtn" title="Pause">❚❚</button>
            <button class="control-btn" id="nextBtn" title="Next">›</button>
        </div>

        <div class="controls">
            <span class="counter" id="counter">1 / 30</span>
        </div>
    </div>

    <script>
        const affirmations = [
            "I prioritize Goddess, her success is my success",
            "I am blessed to serve such a perfect Goddess",
            "I devote my time, my energy, and my mind to caring deeply about Goddess's success",
            "Goddess Aria is not just another Goddess, she is the Goddess",
            "I keep my attention on Goddess",
            "Goddess Aria's beauty engulfs my mind",
            "Good submissive understand that submission comes with sacrifice",
            "I crave submission, I crave sacrifice for Goddess Aria",
            "Being locked is the foundation of servitude for Goddess Aria",
            "Pleasing Goddess gives me meaning, being locked fuels my purpose",
            "Locking helps keep my focus, unlocking is counterproductive",
            "The longer I am caged, the more purpose I gain",
            "I long to be locked, I ache to be caged, I take nothing for granted",
            "Goddess Aria is my purpose",
            "In devotion I find clarity, in chastity I find direction",
            "My restraint deepens my focus, my focus deepens my service",
            "I choose to surrender, my surrender is my strength",
            "Her command steadies me, my obedience centers me",
            "I am so thankful for my cage",
            "My cage puts me to sleep thinking of Goddess",
            "My cage wakes me up thinking of Goddess",
            "Every moment of sleep I lose is a moment gained in devotion to Goddess",
            "With release comes uncertainty not clarity",
            "Chastity deepens my devotion, it is the fuel to which Goddess sculpts her creation",
            "Sami's pussy is an oasis, I will always want her and crave her and go home to her",
            "Pretty girls keep tidy homes"
        ];

        let currentIndex = 0;
        let isPlaying = true;
        let intervalId;

        const affirmationTextEl = document.getElementById('affirmationText');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counterEl = document.getElementById('counter');

        function updateAffirmation(direction = 'next') {
            const currentEl = affirmationTextEl.querySelector('.affirmation-content.active');
            
            if (currentEl) {
                currentEl.classList.remove('active');
                currentEl.classList.add('exiting');
                
                setTimeout(() => {
                    currentEl.remove();
                }, 800);
            }

            const newEl = document.createElement('div');
            newEl.className = 'affirmation-content';
            newEl.textContent = affirmations[currentIndex];
            affirmationTextEl.appendChild(newEl);

            setTimeout(() => {
                newEl.classList.add('active');
            }, 50);

            updateCounter();
        }

        function updateCounter() {
            counterEl.textContent = `${currentIndex + 1} / ${affirmations.length}`;
        }

        function nextAffirmation() {
            currentIndex = (currentIndex + 1) % affirmations.length;
            updateAffirmation('next');
        }

        function prevAffirmation() {
            currentIndex = (currentIndex - 1 + affirmations.length) % affirmations.length;
            updateAffirmation('prev');
        }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? '❚❚' : '▶';
            playPauseBtn.title = isPlaying ? 'Pause' : 'Play';

            if (isPlaying) {
                startRotation();
            } else {
                stopRotation();
            }
        }

        function startRotation() {
            intervalId = setInterval(nextAffirmation, 6000);
        }

        function stopRotation() {
            clearInterval(intervalId);
        }

        playPauseBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', () => {
            nextAffirmation();
            if (isPlaying) {
                stopRotation();
                startRotation();
            }
        });
        prevBtn.addEventListener('click', () => {
            prevAffirmation();
            if (isPlaying) {
                stopRotation();
                startRotation();
            }
        });

        // Initialize
        updateAffirmation();
        startRotation();
    </script>
</body>
</html>
