<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Girl Training HQ 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --hot-pink: #FF69B4;
            --soft-pink: #FFB6D9;
            --baby-pink: #FFC9E3;
            --red: #FF1744;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFE5F0 0%, #FFB6D9 50%, #FF94C8 100%);
            padding: 1rem;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '✨';
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '💖';
            position: fixed;
            top: 20%;
            right: 8%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 7s ease-in-out infinite 1s;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .title {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            color: var(--hot-pink);
            margin-bottom: 0.3rem;
            line-height: 1.4;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
            animation: headerBounce 2.5s ease-in-out infinite;
        }
        @keyframes headerBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--hot-pink);
            font-weight: 600;
        }
        .quote {
            font-family: 'Pacifico', cursive;
            font-size: 1rem;
            color: var(--hot-pink);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .section {
            background: white;
            border: 3px solid var(--hot-pink);
            border-radius: 15px;
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
            margin-bottom: 2rem;
        }
        .section-title {
            font-family: 'Pacifico', cursive;
            font-size: 1.3rem;
            color: var(--hot-pink);
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .section-title::first-letter {
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .divider {
            height: 3px;
            background: white;
            margin: 2rem 0;
            border-radius: 10px;
        }
        .row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .row-full {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .protocol-box {
            background: rgba(255, 182, 217, 0.1);
            padding: 0.8rem;
            border-radius: 10px;
            border-left: 3px solid var(--hot-pink);
            margin-bottom: 0.6rem;
        }
        .protocol-label {
            font-size: 0.8rem;
            color: var(--hot-pink);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }
        .protocol-items {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.8;
            font-weight: 500;
        }
        .protocol-items li {
            margin-bottom: 0.4rem;
        }
        .protocol-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(255, 182, 217, 0.15) 0%, rgba(255, 201, 227, 0.15) 100%);
            padding: 0.8rem;
            border-radius: 10px;
            border-left: 3px solid var(--hot-pink);
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--hot-pink);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .stat-value {
            font-size: 1.3rem;
            color: var(--hot-pink);
            font-weight: 700;
        }
        .mantra-display {
            background: white;
            border: 2px solid var(--baby-pink);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .mantra-text {
            font-family: 'Pacifico', cursive;
            font-size: 1.3rem;
            color: #FF1493;
            line-height: 1.5;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background: linear-gradient(135deg, var(--hot-pink) 0%, #FF1493 100%);
            border: none;
            color: white;
            padding: 0.7rem 1.3rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 0 0.4rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .quiz-input {
            margin-top: 1rem;
            padding: 0.8rem;
            border: 2px solid var(--hot-pink);
            border-radius: 10px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--hot-pink);
            background: rgba(255, 182, 217, 0.1);
            width: 100%;
        }
        .quiz-input::placeholder {
            color: rgba(255, 105, 180, 0.5);
        }
        .quiz-input:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            background: white;
        }
        .quiz-feedback {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
        }
        .correct {
            color: #4CAF50;
        }
        .incorrect {
            color: #FF1744;
        }
        .outfit-builder {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        .clothing-selector {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .clothing-category {
            background: rgba(255, 182, 217, 0.1);
            border: 2px solid var(--hot-pink);
            border-radius: 10px;
            padding: 0.8rem;
        }
        .category-label {
            font-size: 0.8rem;
            color: var(--hot-pink);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .clothing-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .clothing-item {
            width: 70px;
            height: 70px;
            background: white;
            border: 2px solid var(--hot-pink);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            background-size: cover;
            background-position: center;
        }
        .clothing-item:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
        }
        .clothing-item.selected {
            background: linear-gradient(135deg, var(--hot-pink) 0%, #FF1493 100%);
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.7);
        }
        .mannequin {
            background: white;
            border: 3px solid var(--hot-pink);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        .mannequin-display {
            font-size: 6rem;
            line-height: 1;
            margin: 1rem 0;
        }
        .outfit-summary {
            font-size: 0.9rem;
            color: var(--hot-pink);
            text-align: left;
            width: 100%;
            background: rgba(255, 105, 180, 0.1);
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
        .placeholder {
            background: rgba(255, 182, 217, 0.2);
            border: 2px dashed var(--hot-pink);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            color: var(--hot-pink);
            font-weight: 600;
            font-size: 1rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bow {
            text-align: center;
            font-size: 2rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .tag-filter-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 2px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: 'Quicksand';
        }
        .tag-filter-btn.active {
            background: var(--hot-pink);
            border-color: var(--hot-pink);
            color: white;
        }
        .tag-filter-btn[data-filter="encouragedbi"] { color: #FF1744; }
        .tag-filter-btn[data-filter="encouragedbi"].active { background: #FF1744; border-color: #FF1744; }
        .tag-filter-btn[data-filter="sissy"] { color: #FF69B4; }
        .tag-filter-btn[data-filter="sissy"].active { background: #FF69B4; border-color: #FF69B4; }
        .tag-filter-btn[data-filter="gooning"] { color: #9C27B0; }
        .tag-filter-btn[data-filter="gooning"].active { background: #9C27B0; border-color: #9C27B0; }
        .tag-filter-btn[data-filter="cei"] { color: #FF6F00; }
        .tag-filter-btn[data-filter="cei"].active { background: #FF6F00; border-color: #FF6F00; }
        .tag-filter-btn[data-filter="blackmail"] { color: #000; }
        .tag-filter-btn[data-filter="blackmail"].active { background: #000; border-color: #000; }
        .tag-filter-btn[data-filter="throat"] { color: #E91E63; }
        .tag-filter-btn[data-filter="throat"].active { background: #E91E63; border-color: #E91E63; }
        .tag-filter-btn[data-filter="chastity"] { color: #4CAF50; }
        .tag-filter-btn[data-filter="chastity"].active { background: #4CAF50; border-color: #4CAF50; }
        .tag-filter-btn[data-filter="anal"] { color: #FF5722; }
        .tag-filter-btn[data-filter="anal"].active { background: #FF5722; border-color: #FF5722; }
        .tag-filter-btn[data-filter="obedience"] { color: #2196F3; }
        .tag-filter-btn[data-filter="obedience"].active { background: #2196F3; border-color: #2196F3; }
        .month-header {
            background: linear-gradient(135deg, var(--hot-pink) 0%, #FF1493 100%);
            color: white;
            padding: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        .month-header:hover { transform: translateX(5px); }
        .month-header.collapsed { background: linear-gradient(135deg, var(--soft-pink) 0%, #FFB6D9 100%); }
        .month-header i { transition: transform 0.3s; }
        .month-header.collapsed i { transform: rotate(-90deg); }
        .blackmail-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--hot-pink);
            margin-left: 0.5rem;
        }
        .blackmail-item {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid var(--hot-pink);
            border-radius: 10px;
            padding: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .blackmail-item:hover { background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 8px rgba(255, 105, 180, 0.2); }
        .blackmail-title { font-weight: 600; color: #333; }
        .blackmail-link {
            background: var(--hot-pink);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .blackmail-link:hover { opacity: 0.9; }
        .clip-card {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid var(--hot-pink);
            border-radius: 12px;
            padding: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }
        .clip-card:hover { background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 8px rgba(255, 105, 180, 0.2); }
        .clip-info { flex: 1; min-width: 0; }
        .clip-title { font-weight: 600; font-size: 0.95rem; margin: 0 0 0.25rem; color: #333; }
        .clip-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
        .tag-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: 500;
            color: white;
        }
        .tag-badge.encouragedbi { background: #FF1744; }
        .tag-badge.sissy { background: #FF69B4; }
        .tag-badge.gooning { background: #9C27B0; }
        .tag-badge.cei { background: #FF6F00; }
        .tag-badge.blackmail { background: #000; }
        .tag-badge.throat { background: #E91E63; }
        .tag-badge.chastity { background: #4CAF50; }
        .tag-badge.anal { background: #FF5722; }
        .tag-badge.obedience { background: #2196F3; }
        .tag-badge.other { background: #999; }
        .clip-actions {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }
        .clip-btn {
            background: none;
            border: 1px solid var(--hot-pink);
            color: var(--hot-pink);
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        .clip-btn:hover { background: var(--hot-pink); color: white; }
        .clip-btn.active { background: var(--hot-pink); color: white; }
        .clip-link {
            background: var(--hot-pink);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .clip-link:hover { opacity: 0.9; }
        .click-count { font-size: 0.7rem; color: var(--hot-pink); font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <!-- WHITE DIVIDER -->
        <div class="divider"></div>
        <div class="row-2col">
            <div class="section">
                <div class="section-title">🖼️ Blackmail</div>
                <div id="blackmailSection" style="display: none;">
                    <div id="blackmailList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
                </div>
                <div id="blackmailLoading" style="text-align: center; color: #FF69B4;">Loading...</div>
            </div>
            <div class="section">
                <div class="section-title">📚 Library</div>
                <div id="librarySection" style="display: none;">
                    <div style="margin-bottom: 1rem; font-size: 0.85rem; color: #FF69B4; font-weight: 600;">
                        <span id="clipCount">0</span> total clips | <span id="categoryCount">0</span> categories
                    </div>
                    
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                        <input type="text" id="clipSearch" placeholder="Search clips..." style="flex: 1; min-width: 200px; padding: 0.5rem; border: 2px solid #FF69B4; border-radius: 8px; font-family: 'Quicksand'; font-size: 0.9rem;">
                        <select id="sortBy" style="padding: 0.5rem; border: 2px solid #FF69B4; border-radius: 8px; font-family: 'Quicksand'; font-size: 0.9rem;">
                            <option value="title">Sort: A-Z</option>
                            <option value="clicks">Sort: Most Clicked</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem;">
                        <button class="tag-filter-btn active" data-filter="favorites">❤️ Favorited</button>
                        <button class="tag-filter-btn" data-filter="incomplete">📌 Incomplete Tasks</button>
                        <button class="tag-filter-btn" data-filter="encouragedbi">EncouragedBi</button>
                        <button class="tag-filter-btn" data-filter="sissy">Sissy</button>
                        <button class="tag-filter-btn" data-filter="gooning">Gooning</button>
                        <button class="tag-filter-btn" data-filter="cei">CEI</button>
                        <button class="tag-filter-btn" data-filter="blackmail">Blackmail</button>
                        <button class="tag-filter-btn" data-filter="throat">Throat Training</button>
                        <button class="tag-filter-btn" data-filter="chastity">Chastity</button>
                        <button class="tag-filter-btn" data-filter="anal">Anal Training</button>
                        <button class="tag-filter-btn" data-filter="obedience">Obedience Training</button>
                    </div>
                    
                    <div id="clipsList" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
                </div>
                <div id="libraryLoading" style="text-align: center; color: #FF69B4;">Loading library...</div>
            </div>
        </div>

        <!-- WHITE DIVIDER -->
        <div class="divider"></div>

        <!-- WARDROBE -->
        <div class="section">
            <div class="section-title">👗 Outfit Builder</div>
            <div class="outfit-builder">
                <!-- CLOTHING SELECTOR -->
                <div class="clothing-selector">
                    <div class="clothing-category">
                        <div class="category-label">👗 Dresses</div>
                        <div class="clothing-options" data-category="dresses">
                            <div class="clothing-item">👗</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">👚 Tops</div>
                        <div class="clothing-options" data-category="tops">
                            <div class="clothing-item">👚</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">🩱 Skirts/Shorts</div>
                        <div class="clothing-options" data-category="skirts">
                            <div class="clothing-item">🩱</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">👠 Heels</div>
                        <div class="clothing-options" data-category="heels">
                            <div class="clothing-item">👠</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">🧦 Thigh Highs</div>
                        <div class="clothing-options" data-category="thigh-highs">
                            <div class="clothing-item">🧦</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">🩶 Bras</div>
                        <div class="clothing-options" data-category="bras">
                            <div class="clothing-item">🩶</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">🩲 Panties</div>
                        <div class="clothing-options" data-category="panties">
                            <div class="clothing-item">🩲</div>
                        </div>
                    </div>
                    <div class="clothing-category">
                        <div class="category-label">💍 Accessories</div>
                        <div class="clothing-options" data-category="accessories">
                            <div class="clothing-item">💍</div>
                        </div>
                    </div>
                </div>

                <!-- MANNEQUIN -->
                <div class="mannequin">
                    <div class="mannequin-display" id="mannequinDisplay">👸</div>
                    <div class="outfit-summary" id="outfitSummary">
                        <div style="color: var(--hot-pink); font-weight: 600; margin-bottom: 0.5rem;">Selected:</div>
                        <div id="selectedItems">Nothing selected yet</div>
                    </div>
                    <button class="btn" onclick="clearOutfit()" style="width: 100%;">Clear Outfit</button>
                </div>
            </div>
        </div>

        <!-- BOW -->
        <div class="bow">🎀</div>
    </div>

    <script>
        // OUTFIT OBJECT - Define FIRST before HTML uses it
        const outfit = {
            'dresses': null,
            'tops': null,
            'skirts': null,
            'heels': null,
            'thigh-highs': null,
            'bras': null,
            'panties': null,
            'accessories': null
        };

        // Populate wardrobe UI with images from GitHub
        function populateWardrobeUI() {
            const baseUrl = 'https://sissymaddieee.github.io/GGT/wardrobe';
            const categories = ['dresses', 'tops', 'skirts', 'heels', 'thigh-highs', 'bras', 'panties', 'accessories'];

            categories.forEach(category => {
                const container = document.querySelector(`[data-category="${category}"]`);
                if (!container) return;
                
                container.innerHTML = '';
                
                for (let i = 1; i <= 10; i++) {
                    const photoUrl = `${baseUrl}/${category}/${category.replace('-', '_')}_${i}.png`;
                    
                    const item = document.createElement('div');
                    item.className = 'clothing-item';
                    item.style.backgroundImage = `url('${photoUrl}')`;
                    item.style.backgroundSize = 'cover';
                    item.style.backgroundPosition = 'center';
                    item.title = `${category} ${i}`;
                    item.onclick = () => selectClothing(category, photoUrl, item);
                    
                    container.appendChild(item);
                }
            });
        }

        function selectClothing(category, photoUrl, element) {
            const categoryItems = element.parentElement.querySelectorAll('.clothing-item');
            categoryItems.forEach(item => item.classList.remove('selected'));
            element.classList.add('selected');
            outfit[category] = photoUrl;
            updateMannequin();
        }

        function updateMannequin() {
            let selectedItems = [];
            let hasOutfit = false;
            
            if (outfit.dresses) {
                selectedItems.push('✓ Dress');
                hasOutfit = true;
            } else {
                if (outfit.tops) {
                    selectedItems.push('✓ Top');
                    hasOutfit = true;
                }
                if (outfit.bras) {
                    selectedItems.push('✓ Bra');
                    hasOutfit = true;
                }
                if (outfit.skirts) {
                    selectedItems.push('✓ Skirt');
                    hasOutfit = true;
                }
                if (outfit.panties) {
                    selectedItems.push('✓ Panties');
                    hasOutfit = true;
                }
            }

            if (outfit['thigh-highs']) {
                selectedItems.push('✓ Thigh Highs');
                hasOutfit = true;
            }
            if (outfit.heels) {
                selectedItems.push('✓ Heels');
                hasOutfit = true;
            }
            if (outfit.accessories) {
                selectedItems.push('✓ Accessories');
                hasOutfit = true;
            }

            if (!hasOutfit) {
                document.getElementById('mannequinDisplay').innerHTML = '👸';
                document.getElementById('mannequinDisplay').style.fontSize = '6rem';
                document.getElementById('mannequinDisplay').style.textAlign = 'center';
                document.getElementById('mannequinDisplay').style.paddingTop = '2rem';
                document.getElementById('selectedItems').textContent = 'Nothing selected yet';
            } else {
                let html = '<div style="position: relative; width: 100%; min-height: 100%; display: flex; flex-direction: column;">';
                
                let itemIdx = 0;
                
                if (outfit.dresses) {
                    html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.dresses}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                    itemIdx++;
                } else {
                    if (outfit.tops) {
                        html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.tops}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                        itemIdx++;
                    }
                    if (outfit.bras) {
                        html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.bras}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                        itemIdx++;
                    }
                    if (outfit.skirts) {
                        html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.skirts}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                        itemIdx++;
                    }
                    if (outfit.panties) {
                        html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.panties}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                        itemIdx++;
                    }
                }

                if (outfit['thigh-highs']) {
                    html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit['thigh-highs']}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                    itemIdx++;
                }
                if (outfit.heels) {
                    html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.heels}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                    itemIdx++;
                }
                if (outfit.accessories) {
                    html += `<div style="flex: 1; overflow: hidden;"><img src="${outfit.accessories}" style="width: 100%; height: 100%; object-fit: cover;"></div>`;
                    itemIdx++;
                }
                
                html += '</div>';
                
                document.getElementById('mannequinDisplay').innerHTML = html;
                document.getElementById('mannequinDisplay').style.fontSize = 'inherit';
                document.getElementById('mannequinDisplay').style.height = 'auto';
                document.getElementById('selectedItems').innerHTML = selectedItems.join('<br>');
            }
        }

        function clearOutfit() {
            outfit.dresses = null;
            outfit.tops = null;
            outfit.skirts = null;
            outfit.heels = null;
            outfit['thigh-highs'] = null;
            outfit.bras = null;
            outfit.panties = null;
            outfit.accessories = null;
            
            document.querySelectorAll('.clothing-item').forEach(item => item.classList.remove('selected'));
            updateMannequin();
        }

        // Load wardrobe images when page loads
        window.addEventListener('load', populateWardrobeUI);

        // LIBRARY
        let clips = [];
        let clipStats = {};

        async function loadLibrary() {
            try {
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_U4ZElEgkBkgv6jP20hJICA3lCqlWli4EezWccqE7F3JksP5F0qg9_OClPU6MaW1fawjHX5Gr7ZXs/pub?gid=192779347&single=true&output=csv';
                const response = await fetch(csvUrl);
                const csv = await response.text();
                const lines = csv.trim().split('\n');
                
                clips = [];
                let categories = new Set();
                
                lines.forEach((line, idx) => {
                    if (idx === 0 || !line.trim()) return;
                    
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        const title = (parts[0] || '').trim();
                        const link = (parts[1] || '').trim();
                        const tag1 = (parts[2] || '').trim();
                        const tag2 = (parts[3] || '').trim();
                        const notes = (parts[4] || '').trim();
                        
                        if (title && link) {
                            const tags = [];
                            if (tag1) {
                                tags.push(tag1);
                                categories.add(tag1);
                            }
                            if (tag2) {
                                tags.push(tag2);
                                categories.add(tag2);
                            }
                            
                            clips.push({ title, link, tags, notes });
                            if (!clipStats[title]) {
                                clipStats[title] = { clicks: 0, favorite: false, incomplete: false };
                            }
                        }
                    }
                });
                
                loadClipStats();
                // Apply favorites filter immediately
                currentTagFilter = 'favorites';
                filterAndRenderLibrary();
                
                document.getElementById('libraryLoading').style.display = 'none';
                document.getElementById('librarySection').style.display = 'block';
                document.getElementById('clipCount').textContent = clips.length;
                document.getElementById('categoryCount').textContent = categories.size;
                
                document.getElementById('clipSearch').addEventListener('input', filterAndRenderLibrary);
                document.getElementById('sortBy').addEventListener('change', filterAndRenderLibrary);
                
                document.querySelectorAll('.tag-filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        currentTagFilter = e.target.dataset.filter;
                        filterAndRenderLibrary();
                    });
                });
                
            } catch (e) {
                console.log('Library error:', e);
            }
        }

        function saveClipStats() {
            localStorage.setItem('ggcClipStats', JSON.stringify(clipStats));
        }

        function loadClipStats() {
            const saved = localStorage.getItem('ggcClipStats');
            if (saved) {
                clipStats = JSON.parse(saved);
            }
        }

        function getTagClass(tag) {
            const t = tag.trim();
            if (t === 'EncouragedBi') return 'encouragedbi';
            if (t === 'Sissy') return 'sissy';
            if (t === 'Gooning') return 'gooning';
            if (t === 'CEI') return 'cei';
            if (t === 'Blackmail') return 'blackmail';
            if (t === 'Throat Training') return 'throat';
            if (t === 'Chastity') return 'chastity';
            if (t === 'Anal Training') return 'anal';
            if (t === 'Obedience Training') return 'obedience';
            return 'other';
        }

        let currentTagFilter = 'favorites';

        function filterAndRenderLibrary() {
            const searchText = document.getElementById('clipSearch').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;
            
            let filtered = clips.filter(clip => {
                const matchesSearch = clip.title.toLowerCase().includes(searchText) ||
                    clip.tags.some(tag => tag.toLowerCase().includes(searchText));
                
                let matchesFilter = true;
                
                if (currentTagFilter === 'favorites') {
                    matchesFilter = clipStats[clip.title]?.favorite || false;
                } else if (currentTagFilter === 'incomplete') {
                    matchesFilter = clipStats[clip.title]?.incomplete || false;
                } else if (currentTagFilter !== 'all') {
                    // Only show clips that have THIS specific tag
                    matchesFilter = clip.tags.some(tag => getTagClass(tag) === currentTagFilter);
                }
                
                return matchesSearch && matchesFilter;
            });
            
            if (sortBy === 'clicks') {
                filtered.sort((a, b) => (clipStats[b.title]?.clicks || 0) - (clipStats[a.title]?.clicks || 0));
            } else {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            }
            
            renderLibrary(filtered);
        }

        function renderLibrary(clipsToRender) {
            const list = document.getElementById('clipsList');
            list.innerHTML = '';
            
            clipsToRender.forEach(clip => {
                const stats = clipStats[clip.title] || { clicks: 0, favorite: false, incomplete: false };
                
                const card = document.createElement('div');
                card.className = 'clip-card';
                
                let tagsHTML = '';
                clip.tags.forEach(tag => {
                    const tagClass = getTagClass(tag);
                    tagsHTML += `<span class="tag-badge ${tagClass}">${tag}</span>`;
                });
                
                card.innerHTML = `
                    <div class="clip-info">
                        <p class="clip-title" title="${clip.notes}">${clip.title}</p>
                        <div class="clip-tags">
                            ${tagsHTML}
                        </div>
                        <div class="click-count">${stats.clicks} clicks</div>
                    </div>
                    <div class="clip-actions">
                        <button class="clip-btn ${stats.favorite ? 'active' : ''}" onclick="toggleFavorite('${clip.title}')">❤️</button>
                        <button class="clip-btn ${stats.incomplete ? 'active' : ''}" onclick="toggleIncomplete('${clip.title}')">📌</button>
                        <a href="${clip.link}" class="clip-link" target="_blank" onclick="recordClick('${clip.title}')">Watch</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function recordClick(title) {
            if (!clipStats[title]) clipStats[title] = { clicks: 0, favorite: false, incomplete: false };
            clipStats[title].clicks++;
            saveClipStats();
            filterAndRenderLibrary();
        }

        function toggleFavorite(title) {
            if (!clipStats[title]) clipStats[title] = { clicks: 0, favorite: false, incomplete: false };
            clipStats[title].favorite = !clipStats[title].favorite;
            saveClipStats();
            filterAndRenderLibrary();
        }

        function toggleIncomplete(title) {
            if (!clipStats[title]) clipStats[title] = { clicks: 0, favorite: false, incomplete: false };
            clipStats[title].incomplete = !clipStats[title].incomplete;
            saveClipStats();
            filterAndRenderLibrary();
        }

        window.addEventListener('load', function() {
            loadLibrary();
            // Apply favorites filter after a brief delay to ensure clips are loaded
            setTimeout(() => {
                filterAndRenderLibrary();
            }, 500);
        });

        // BLACKMAIL
        async function loadBlackmail() {
            try {
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_U4ZElEgkBkgv6jP20hJICA3lCqlWli4EezWccqE7F3JksP5F0qg9_OClPU6MaW1fawjHX5Gr7ZXs/pub?gid=1956196577&single=true&output=csv';
                const response = await fetch(csvUrl);
                const csv = await response.text();
                const lines = csv.trim().split('\n');
                
                // Group by Month/Year
                let grouped = {};
                
                lines.forEach((line, idx) => {
                    if (idx === 0 || !line.trim()) return;
                    
                    const parts = line.split(',');
                    if (parts.length >= 4) {
                        const month = (parts[0] || '').trim();
                        const year = (parts[1] || '').trim();
                        const title = (parts[2] || '').trim();
                        const link = (parts[3] || '').trim();
                        
                        if (month && year && title && link) {
                            const key = `${month} ${year}`;
                            if (!grouped[key]) {
                                grouped[key] = { month, year, items: [] };
                            }
                            grouped[key].items.push({ title, link });
                        }
                    }
                });
                
                renderBlackmail(grouped);
                
                document.getElementById('blackmailLoading').style.display = 'none';
                document.getElementById('blackmailSection').style.display = 'block';
                
            } catch (e) {
                console.log('Blackmail error:', e);
            }
        }

        function renderBlackmail(grouped) {
            const list = document.getElementById('blackmailList');
            list.innerHTML = '';
            
            // Sort by date descending (newest first)
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const sorted = Object.values(grouped).sort((a, b) => {
                const yearDiff = parseInt(b.year) - parseInt(a.year);
                if (yearDiff !== 0) return yearDiff;
                return months.indexOf(b.month) - months.indexOf(a.month);
            });
            
            sorted.forEach(monthData => {
                const monthSection = document.createElement('div');
                
                const header = document.createElement('div');
                header.className = 'month-header';
                header.innerHTML = `
                    <span>${monthData.month} ${monthData.year}</span>
                    <i class="ti ti-chevron-down"></i>
                `;
                header.onclick = () => {
                    header.classList.toggle('collapsed');
                    itemsContainer.style.display = header.classList.contains('collapsed') ? 'none' : 'flex';
                };
                
                const itemsContainer = document.createElement('div');
                itemsContainer.className = 'blackmail-items';
                
                monthData.items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'blackmail-item';
                    itemEl.innerHTML = `
                        <p class="blackmail-title">${item.title}</p>
                        <a href="${item.link}" class="blackmail-link" target="_blank">View</a>
                    `;
                    itemsContainer.appendChild(itemEl);
                });
                
                monthSection.appendChild(header);
                monthSection.appendChild(itemsContainer);
                list.appendChild(monthSection);
            });
        }

        window.addEventListener('load', loadBlackmail);
    </script>
