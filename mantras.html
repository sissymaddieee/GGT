<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Girl Mantras 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --hot-pink: #FF69B4;
            --soft-pink: #FFB6D9;
            --baby-pink: #FFC9E3;
            --gold: #FFD700;
            --white: #FFFFFF;
            --cream: #FFF5F7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFE5F0 0%, #FFB6D9 50%, #FF94C8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
            position: relative;
        }

        /* Sparkle Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.4) 0%, transparent 2%),
                radial-gradient(circle at 60% 70%, rgba(255, 255, 255, 0.6) 0%, transparent 2%),
                radial-gradient(circle at 80% 20%, rgba(255, 105, 180, 0.3) 0%, transparent 2%),
                radial-gradient(circle at 30% 80%, rgba(255, 215, 0, 0.5) 0%, transparent 2%),
                radial-gradient(circle at 90% 60%, rgba(255, 255, 255, 0.4) 0%, transparent 2%);
            background-size: 200% 200%;
            animation: sparkleMove 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sparkleMove {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        .container {
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            animation: bounceIn 1s ease-out;
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .title {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: var(--hot-pink);
            text-shadow: 
                2px 2px 0px rgba(255, 255, 255, 0.8),
                4px 4px 10px rgba(255, 105, 180, 0.4);
            margin-bottom: 0.3rem;
            position: relative;
            display: inline-block;
        }

        .title::before {
            content: '✨';
            position: absolute;
            left: -40px;
            animation: sparkle 2s ease-in-out infinite;
        }

        .title::after {
            content: '✨';
            position: absolute;
            right: -40px;
            animation: sparkle 2s ease-in-out infinite 1s;
        }

        @keyframes sparkle {
            0%, 100% { 
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            50% { 
                opacity: 0.5;
                transform: scale(1.3) rotate(180deg);
            }
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--hot-pink);
            font-weight: 500;
            letter-spacing: 0.05rem;
        }

        .hearts-divider {
            text-align: center;
            font-size: 1.2rem;
            margin: 1rem 0;
            color: var(--soft-pink);
        }

        .affirmation-card {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid var(--hot-pink);
            border-radius: 25px;
            padding: 3rem 2.5rem;
            position: relative;
            box-shadow: 
                0 8px 32px rgba(255, 105, 180, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.8);
            animation: floatIn 1.2s ease-out 0.3s both;
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Decorative Hearts */
        .affirmation-card::before {
            content: '💕';
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 1.5rem;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        .affirmation-card::after {
            content: '💕';
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 1.5rem;
            animation: heartBeat 1.5s ease-in-out infinite 0.75s;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
        }

        .affirmation-text {
            font-size: 1.7rem;
            line-height: 1.5;
            color: #FF1493;
            text-align: center;
            font-weight: 500;
            position: relative;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .affirmation-content {
            position: absolute;
            width: 100%;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0 1rem;
        }

        .affirmation-content.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .affirmation-content.exiting {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .control-btn {
            background: linear-gradient(135deg, var(--hot-pink) 0%, #FF1493 100%);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
        }

        .control-btn:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 6px 25px rgba(255, 105, 180, 0.6);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .play-pause-btn {
            width: 55px;
            height: 55px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--gold) 0%, #FFA500 100%);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.5);
        }

        .play-pause-btn:hover {
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.7);
        }

        .counter {
            font-size: 0.95rem;
            color: var(--hot-pink);
            font-weight: 600;
            text-align: center;
            margin-top: 1rem;
            letter-spacing: 0.05rem;
        }

        .bow {
            text-align: center;
            font-size: 2rem;
            margin-top: 1rem;
            animation: swayBow 3s ease-in-out infinite;
        }

        @keyframes swayBow {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }

            .title::before,
            .title::after {
                left: -30px;
                right: -30px;
            }

            .affirmation-text {
                font-size: 1.4rem;
                min-height: 90px;
            }

            .affirmation-card {
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Good Girl Mantras</h1>
            <p class="subtitle">for Goddess Aria 💖</p>
        </div>

        <div class="hearts-divider">💕 💕 💕</div>

        <div class="affirmation-card">
            <div class="affirmation-text" id="affirmationText">
                <div class="affirmation-content active"></div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="prevBtn" title="Previous" aria-label="Previous mantra">‹</button>
            <button class="control-btn play-pause-btn" id="playPauseBtn" title="Pause" aria-label="Pause">❚❚</button>
            <button class="control-btn" id="nextBtn" title="Next" aria-label="Next mantra">›</button>
        </div>

        <div class="counter" id="counter">1 / 26</div>

        <div class="bow">🎀</div>
    </div>

    <script>
        const affirmations = [
            "I prioritize Goddess, her success is my success",
            "I am blessed to serve such a perfect Goddess",
            "I devote my time, my energy, and my mind to caring deeply about Goddess's success",
            "Goddess Aria is not just another Goddess, she is the Goddess",
            "I keep my attention on Goddess",
            "Goddess Aria's beauty engulfs my mind",
            "Good submissive understand that submission comes with sacrifice",
            "I crave submission, I crave sacrifice for Goddess Aria",
            "Being locked is the foundation of servitude for Goddess Aria",
            "Pleasing Goddess gives me meaning, being locked fuels my purpose",
            "Locking helps keep my focus, unlocking is counterproductive",
            "The longer I am caged, the more purpose I gain",
            "I long to be locked, I ache to be caged, I take nothing for granted",
            "Goddess Aria is my purpose",
            "In devotion I find clarity, in chastity I find direction",
            "My restraint deepens my focus, my focus deepens my service",
            "I choose to surrender, my surrender is my strength",
            "Her command steadies me, my obedience centers me",
            "I am so thankful for my cage",
            "My cage puts me to sleep thinking of Goddess",
            "My cage wakes me up thinking of Goddess",
            "Every moment of sleep I lose is a moment gained in devotion to Goddess",
            "With release comes uncertainty not clarity",
            "Chastity deepens my devotion, it is the fuel to which Goddess sculpts her creation",
            "Sami's pussy is an oasis, I will always want her and crave her and go home to her",
            "Pretty girls keep tidy homes"
        ];

        let currentIndex = 0;
        let isPlaying = true;
        let intervalId;

        const affirmationTextEl = document.getElementById('affirmationText');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counterEl = document.getElementById('counter');

        function updateAffirmation() {
            const currentEl = affirmationTextEl.querySelector('.affirmation-content.active');
            
            if (currentEl) {
                currentEl.classList.remove('active');
                currentEl.classList.add('exiting');
                
                setTimeout(() => {
                    currentEl.remove();
                }, 600);
            }

            const newEl = document.createElement('div');
            newEl.className = 'affirmation-content';
            newEl.textContent = affirmations[currentIndex];
            affirmationTextEl.appendChild(newEl);

            setTimeout(() => {
                newEl.classList.add('active');
            }, 50);

            updateCounter();
        }

        function updateCounter() {
            counterEl.textContent = `${currentIndex + 1} / ${affirmations.length}`;
        }

        function nextAffirmation() {
            currentIndex = (currentIndex + 1) % affirmations.length;
            updateAffirmation();
        }

        function prevAffirmation() {
            currentIndex = (currentIndex - 1 + affirmations.length) % affirmations.length;
            updateAffirmation();
        }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? '❚❚' : '▶';
            playPauseBtn.title = isPlaying ? 'Pause' : 'Play';

            if (isPlaying) {
                startRotation();
            } else {
                stopRotation();
            }
        }

        function startRotation() {
            intervalId = setInterval(nextAffirmation, 5000);
        }

        function stopRotation() {
            clearInterval(intervalId);
        }

        playPauseBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', () => {
            nextAffirmation();
            if (isPlaying) {
                stopRotation();
                startRotation();
            }
        });
        prevBtn.addEventListener('click', () => {
            prevAffirmation();
            if (isPlaying) {
                stopRotation();
                startRotation();
            }
        });

        // Initialize
        updateAffirmation();
        startRotation();
    </script>
</body>
</html>
