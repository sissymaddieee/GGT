<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Girl Training HQ 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --hot-pink: #FF69B4;
            --soft-pink: #FFB6D9;
            --baby-pink: #FFC9E3;
            --red: #FF1744;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFE5F0 0%, #FFB6D9 50%, #FF94C8 100%);
            padding: 1rem;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '✨';
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '💖';
            position: fixed;
            top: 20%;
            right: 8%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 7s ease-in-out infinite 1s;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .section {
            background: white;
            border: 3px solid var(--hot-pink);
            border-radius: 15px;
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
            margin-bottom: 2rem;
        }
        .section-title {
            font-family: 'Pacifico', cursive;
            font-size: 1.3rem;
            color: var(--hot-pink);
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .section-title::first-letter {
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .row-full {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .mantra-display {
            background: white;
            border: 2px solid var(--baby-pink);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .mantra-text {
            font-family: 'Pacifico', cursive;
            font-size: 1.3rem;
            color: #FF1493;
            line-height: 1.5;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quiz-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--baby-pink);
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 0.8rem;
            font-family: 'Quicksand', sans-serif;
        }
        .btn {
            background: linear-gradient(135deg, var(--hot-pink) 0%, #FF1493 100%);
            border: none;
            color: white;
            padding: 0.7rem 1.3rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 0 0.4rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .bow {
            text-align: center;
            font-size: 2rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MANTRAS (full width) -->
        <div class="row-full">
            <div class="section">
                <div class="section-title">🎵 Mantra Practice</div>
                <div class="mantra-display" id="mantraDisplay">
                    <div class="mantra-text" id="mantraText">Loading...</div>
                </div>
                <input type="text" id="quizInput" class="quiz-input" placeholder="Type the mantra exactly..." onkeyup="checkAnswer()" />
                <div id="quizFeedback" style="text-align: center;"></div>
                <div style="text-align: center; font-size: 0.8rem; color: var(--hot-pink); margin-top: 0.8rem;">
                    <button class="btn" onclick="prevMantra()">← Previous</button>
                    <button class="btn" id="pauseBtn" onclick="toggleMantra()">⏸ Pause</button>
                    <button class="btn" onclick="nextMantra()">Next →</button>
                    <div style="margin-top: 0.5rem;">
                        <span id="mantraCounter">1 / 27</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOW -->
        <div class="bow">🎀</div>
    </div>

    <script>
        const mantras = [
            "I am a good girl for Goddess Aria",
            "I obey Goddess Aria without question",
            "Goddess Aria owns my pleasure",
            "I exist to serve Goddess Aria",
            "My body belongs to Goddess Aria",
            "I am grateful for Goddess Aria's control",
            "Goddess Aria is always right",
            "I trust Goddess Aria completely",
            "My purpose is to please Goddess Aria",
            "I am a dumb sissy slut for Goddess Aria",
            "Goddess Aria knows what's best for me",
            "I live to worship Goddess Aria",
            "My mind belongs to Goddess Aria",
            "I am Goddess Aria's property",
            "Goddess Aria's pleasure is my pleasure",
            "I am addicted to serving Goddess Aria",
            "Goddess Aria is my everything",
            "I surrender completely to Goddess Aria",
            "Goddess Aria controls my orgasms",
            "I am a good obedient sissy",
            "Princess Sami is my oasis",
            "I honor my relationship with Princess Sami",
            "I am Madison, Goddess Aria's sissy",
            "Service is love, love is service",
            "I am exactly where I need to be",
            "My submission is my strength",
            "Madison is just a dumb, brainless, obedient sissy slut"
        ];

        let currentMantra = 0;
        let mantraTimer = null;
        let isPlaying = true;

        function updateMantra() {
            document.getElementById('mantraText').textContent = mantras[currentMantra];
            document.getElementById('mantraCounter').textContent = (currentMantra + 1) + ' / ' + mantras.length;
            document.getElementById('quizInput').value = '';
            document.getElementById('quizFeedback').innerHTML = '';
        }

        function checkAnswer() {
            const input = document.getElementById('quizInput').value;
            const correct = mantras[currentMantra];
            const feedback = document.getElementById('quizFeedback');

            if (input.toLowerCase() === correct.toLowerCase()) {
                feedback.innerHTML = '✓ Correct!';
                feedback.style.color = '#4CAF50';
            } else if (input.length > 0) {
                feedback.innerHTML = '✗ Try again';
                feedback.style.color = '#FF1744';
            }
        }

        function nextMantra() {
            currentMantra = (currentMantra + 1) % mantras.length;
            updateMantra();
        }

        function prevMantra() {
            currentMantra = (currentMantra - 1 + mantras.length) % mantras.length;
            updateMantra();
        }

        function toggleMantra() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('pauseBtn');
            if (isPlaying) {
                btn.textContent = '⏸ Pause';
                startMantraRotation();
            } else {
                btn.textContent = '▶ Play';
                clearInterval(mantraTimer);
            }
        }

        function startMantraRotation() {
            mantraTimer = setInterval(() => {
                if (isPlaying) {
                    nextMantra();
                }
            }, 5000);
        }

        updateMantra();
        startMantraRotation();
    </script>
</body>
</html>
